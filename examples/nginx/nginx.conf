user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
	worker_connections 768;
}

http {
    server {
		listen 80;
		server_name localhost;
		location / {
    		proxy_pass http://localhost:5000; # location of the POW challenge Flask application. CHANGE ME

    		proxy_set_header Host $host;
    		proxy_set_header X-Forwarded-Host $host;
    		proxy_set_header X-Forwarded-Proto $scheme;

        	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			
    		proxy_set_header Cookie $http_cookie;
    		proxy_cookie_domain localhost:5000 localhost;   // CHANGE ME
    		proxy_cookie_path / /;
			proxy_cookie_flags ~ Secure HttpOnly SameSite=Lax;
        	proxy_set_header X-Forwarded-Prefix /;
		}
    }


	
	server {
    	listen 8080; # true backend that requests with the cookie get forwarded to. CHANGE ME.
		server_name localhost;
    	root /data/test_page; // The root folder of your HTML crapfest
	}
}